server.port=${SERVER_PORT:8080}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

spring.application.name=extract-metadata-agent
spring.activemq.brokerUrl=${ALFRESCO_EVENTS_BROKER_URL:tcp://alfresco-dockia-agents-activemq:61616}
spring.jms.cache.enabled=false

agent.alfresco-base-url=${ALFRESCO_BASE_URL:http://localhost:8080/alfresco}
agent.alfresco-auth-type=${ALFRESCO_AUTH_TYPE:basic}
agent.alfresco-username=${ALFRESCO_USERNAME:admin}
agent.alfresco-password=${ALFRESCO_PASSWORD:admin}
agent.document-type=${ALFRESCO_DOCUMENT_TYPE:cm:content}
agent.metadata-aspect=em:personMetadata
agent.content-max-chars=${CONTENT_MAX_CHARS:12000}

agent.llm.provider=${LLM_PROVIDER:ollama}
agent.llm.base-url=${LLM_BASE_URL:http://ollama:11434}
agent.llm.model=${LLM_MODEL:llama3.1}
agent.llm.api-key=${LLM_API_KEY:}
agent.llm.prompt=${AGENT_PROMPT:Eres un agente que extrae nombre, apellido1, apellido2, DNI y fechaNacimiento de documentos. Devuelve solo JSON valido.}
