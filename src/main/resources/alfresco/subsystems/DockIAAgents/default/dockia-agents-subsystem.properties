
# Arranca el subsistema cuando se inicia el contexto principal de Alfresco.
alfresco.aiagents.subsystem.autoStart=true

# Arranca los contenedores registrados cuando se inicia el subsistema.
alfresco.aiagents.subsystem.startAgentsOnStart=true

# Detiene los contenedores registrados cuando se detiene el subsistema.
alfresco.aiagents.subsystem.stopAgentsOnStop=true

# Tiempo maximo que Docker esperara antes de forzar la parada del contenedor.
alfresco.aiagents.subsystem.stopTimeoutSeconds=10
